<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- Border frame -->
  <rect x="32" y="32" width="1136" height="566" rx="20" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Accent dots -->
  <circle cx="80" cy="80" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="1120" cy="80" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="80" cy="550" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="1120" cy="550" r="3" fill="#6366f1" opacity="0.5"/>

  <!-- Logo -->
  <text x="600" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="88" font-weight="700" text-anchor="middle" letter-spacing="-2">
    <tspan fill="white">Axion</tspan><tspan fill="url(#textGrad)">Dev</tspan>
  </text>

  <!-- Divider line -->
  <line x1="440" y1="230" x2="760" y2="230" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Tagline -->
  <text x="600" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="400" text-anchor="middle" fill="#a3a3a3" letter-spacing="0.5">Websites that bring you clients.</text>
  <text x="600" y="335" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="600" text-anchor="middle" fill="#e5e5e5">Not in months — in days.</text>

  <!-- Stats row -->
  <rect x="180" y="400" width="240" height="100" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1"/>
  <text x="300" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" text-anchor="middle" fill="url(#textGrad)">10+</text>
  <text x="300" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" text-anchor="middle" fill="#737373">Projects shipped</text>

  <rect x="480" y="400" width="240" height="100" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1"/>
  <text x="600" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" text-anchor="middle" fill="url(#textGrad)">&lt;14 days</text>
  <text x="600" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" text-anchor="middle" fill="#737373">Avg. delivery time</text>

  <rect x="780" y="400" width="240" height="100" rx="12" fill="#ffffff" fill-opacity="0.03" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1"/>
  <text x="900" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" text-anchor="middle" fill="url(#textGrad)">4.2%</text>
  <text x="900" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" text-anchor="middle" fill="#737373">Avg. conversion rate</text>

  <!-- URL hint -->
  <text x="600" y="575" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" text-anchor="middle" fill="#525252" letter-spacing="1">axiondev.dev</text>
</svg>
